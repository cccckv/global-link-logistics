version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: globallink-db
    environment:
      - POSTGRES_DB=globallink
      - POSTGRES_USER=logistics
      - POSTGRES_PASSWORD=password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - globallink-network
    restart: unless-stopped

  # Redis Cache
  cache:
    image: redis:7-alpine
    container_name: globallink-cache
    ports:
      - "6379:6379"
    networks:
      - globallink-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: globallink-backend
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://logistics:password@db:5432/globallink
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - AFTERSHIP_API_KEY=${AFTERSHIP_API_KEY}
      - BACKEND_PORT=3000
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5174
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
      - cache
    networks:
      - globallink-network
    restart: unless-stopped
    command: npm run dev

  # Customer Portal (React + Vite)
  customer-portal:
    build:
      context: ./frontend/customer
      dockerfile: Dockerfile.dev
    container_name: globallink-customer
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
      - VITE_WS_URL=http://localhost:3000
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
      - VITE_CESIUM_ION_TOKEN=${VITE_CESIUM_ION_TOKEN}
      - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/customer:/app
      - /app/node_modules
    networks:
      - globallink-network
    restart: unless-stopped
    command: npm run dev

  # Admin Console (Vue3 + Vben)
  admin-console:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile.dev
    container_name: globallink-admin
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
      - VITE_WS_URL=http://localhost:3000
    ports:
      - "5174:5174"
    volumes:
      - ./frontend/admin:/app
      - /app/node_modules
    networks:
      - globallink-network
    restart: unless-stopped
    command: npm run dev

volumes:
  pgdata:

networks:
  globallink-network:
    driver: bridge
